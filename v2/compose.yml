# Podman Compose — Deploy AdityaVikramPortfolio (v2)
# Usage:
#   1. Copy .env.example to .env and fill in your values
#   2. podman build --network=host -t portfolio .
#   3. podman-compose up -d
#
# NOTE: Build needs --network=host because /dev/net/tun is unavailable
# in this environment (nested container). The compose build config
# can't pass this flag through, so build manually first, then use
# compose for runtime management.

services:
  portfolio:
    image: portfolio
    container_name: portfolio
    ports:
      - "3000:3000"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - "app=aditya-vikram-portfolio"
      - "version=v2"
