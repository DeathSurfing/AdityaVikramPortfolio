# Podman Compose — Deploy AdityaVikramPortfolio (v2)
# Usage:
#   1. Copy .env.example to .env and fill in your values
#   2. podman-compose up -d
#   3. podman-compose down

services:
  portfolio:
    build:
      context: .
      dockerfile: dockerfile
      network: host
      args:
        - NEXT_PUBLIC_CONVEX_URL=${NEXT_PUBLIC_CONVEX_URL}
    container_name: aditya-portfolio
    network_mode: host
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - "app=aditya-vikram-portfolio"
      - "version=v2"
